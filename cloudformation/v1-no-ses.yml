AWSTemplateFormatVersion: '2010-09-09'
Description: Mastodon on AWS (SES removed for Learner Lab compatibility)
Parameters:
  DomainName:
    Description: The domain name for the Mastodon instance (e.g. social.cloudonaut.io)
    Type: String
  SecretKeyBase:
    Description: Mastodon config SECRET_KEY_BASE
    Type: String
    NoEcho: true
  OtpSecret:
    Description: Mastodon config OTP_SECRET
    Type: String
    NoEcho: true
  VapidPrivateKey:
    Description: Mastodon config VAPID_PRIVATE_KEY
    Type: String
    NoEcho: true
  VapidPublicKey:
    Description: Mastodon config VAPID_PUBLIC_KEY
    Type: String
    NoEcho: true
  ActiveRecordEncryptionDeterministicKey:
    Description: Mastodon config ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    Type: String
    NoEcho: true
  ActiveRecordEncryptionKeyDerivationSalt:
    Description: Mastodon config ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    Type: String
    NoEcho: true
  ActiveRecordEncryptionPrimaryKey:
    Description: Mastodon config ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    Type: String
    NoEcho: true
  Spot:
    Description: Reduce costs and decrease availability by running on Fargate Spot?
    Type: String
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
  AlertingHttpsEndpoint:
    Description: Send infrastructure alarms and notifications to this HTTPS endpoint. (optional)
    Type: String
    Default: ''
  AlertingEmail:
    Description: Send infrastructure alarms and notifications to this email address. (optional)
    Type: String
    Default: ''
  DatabaseAllocatedStorage:
    Description: Provisioned storage for MySQL database (RDS)
    Type: String
    Default: '5'
  ContainerInsights:
    Description: Enable detailed container monitoring.
    Type: String
    Default: enabled
    AllowedValues:
    - enabled
    - disabled
  DatabaseBackupRetentionPeriod:
    Description: Number of days to keep automated snapshots
    Type: Number
    Default: 1
  OverrideMastodonContainerImage:
    Description: Override the container image used to spin up the web and the sidekiq service.
    Type: String
    Default: ''
  OverrideMastodonStreamingContainerImage:
    Description: Override the container image used to spin up the streaming API service.
    Type: String
    Default: ''

Conditions:
  HasOverrideMastodonContainerImage:
    Fn::Not:
    - Fn::Equals:
      - Ref: OverrideMastodonContainerImage
      - ''
  HasOverrideMastodonStreamingContainerImage:
    Fn::Not:
    - Fn::Equals:
      - Ref: OverrideMastodonStreamingContainerImage
      - ''

Resources:
  Alerting:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        HttpsEndpoint:
          Ref: AlertingHttpsEndpoint
        Email:
          Ref: AlertingEmail
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/bb25315db98353a3d0ee920383fcf41f.template

  Key:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        AliasName: ''
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/08045067565895d23a4b4fa47ee66870.template

  Secret:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        KmsKeyModule:
          Fn::GetAtt:
          - Key
          - Outputs.StackName
        Description: Database password for Mastodon on AWS
        CharactersToExclude: '"@/\'
        PasswordLength: 30
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/19f2f47723b74267bec8f1ff82c0508d.template

  HostedZone:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        Name:
          Ref: DomainName
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/369ea5b32e3bcb94d153cde2903d60ab.template

  Vpc:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        ClassB: 0
        NumberOfAvailabilityZones: 2
        S3Endpoint: true
        DynamoDBEndpoint: true
        FlowLog: reject-only
        FlowLogRetentionInDays: 14
        NatGateways: false
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/8c80928b41261c03d1a61df0e516e3cb.template

  ClientSg:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/25b0546b4bb148dde1059393c09a1008.template

  Bucket:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        Access: CloudFrontRead
        Versioning: 'false'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/81dd1a7734943407662ba884615029b1.template

  CloudFront:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        OriginBucketModule:
          Fn::GetAtt:
          - Bucket
          - Outputs.StackName
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/101adbf59794ab7a723685b60ecd8324.template

  Cache:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        ClientSgModule:
          Fn::GetAtt:
          - ClientSg
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        KmsKeyModule:
          Fn::GetAtt:
          - Key
          - Outputs.StackName
        EngineVersion: 5.0.6
        CacheNodeType: cache.t4g.micro
        TransitEncryption: 'false'
        AuthToken: ''
        SnapshotRetentionLimit: '35'
        SnapshotName: ''
        NumShards: '1'
        NumReplicas: '0'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/cbd918d6953c5f64f556cd969e415b3e.template

  Database:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        ClientSgModule:
          Fn::GetAtt:
          - ClientSg
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        KmsKeyModule:
          Fn::GetAtt:
          - Key
          - Outputs.StackName
        SecretModule:
          Fn::GetAtt:
          - Secret
          - Outputs.StackName
        DBAllocatedStorage:
          Ref: DatabaseAllocatedStorage
        DBInstanceClass: db.t4g.micro
        DBName: mastodon
        DBBackupRetentionPeriod:
          Ref: DatabaseBackupRetentionPeriod
        DBMasterUsername: mastodon
        DBMultiAZ: 'false'
        EngineVersion: '15'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/f30fd432b429f055457e393297e43837.template

  Cluster:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ContainerInsights:
          Ref: ContainerInsights
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/64bea282465d9ad2240252d09d792c89.template

  AlbAccessLogBucket:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        Access: ElbAccessLogWrite
        Versioning: 'false'
        ExpirationInDays: '14'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/81dd1a7734943407662ba884615029b1.template

  Alb:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        BucketModule:
          Fn::GetAtt:
          - AlbAccessLogBucket
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        Scheme: internet-facing
        IdleTimeoutInSeconds: '60'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/fb10952686b139b17dc263f63e487da3.template

  AlbListener:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlbModule:
          Fn::GetAtt:
          - Alb
          - Outputs.StackName
        Port: '443'
        CertificateArn:
          Fn::GetAtt:
          - Certificate
          - Outputs.Arn
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/fce2b1e58aefbfa33126c126f1a56a2a.template

  HttpListener:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlbModule:
          Fn::GetAtt:
          - Alb
          - Outputs.StackName
        Port: '80'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/fce2b1e58aefbfa33126c126f1a56a2a.template

  Redirect:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlbListenerModule:
          Fn::GetAtt:
          - HttpListener
          - Outputs.StackName
        RedirectPort: '443'
        Priority: '1'
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/cb8719b3126c24164e7f50a144ae6d70.template

  Target:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlbModule:
          Fn::GetAtt:
          - Alb
          - Outputs.StackName
        AlbListenerModule:
          Fn::GetAtt:
          - AlbListener
          - Outputs.StackName
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        HealthCheckPath: /health
        Priority: 3
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/24cf8ac2cb4ef96915ed55c63019e1eb.template

  StreamingApiTarget:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AlbModule:
          Fn::GetAtt:
          - Alb
          - Outputs.StackName
        AlbListenerModule:
          Fn::GetAtt:
          - AlbListener
          - Outputs.StackName
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        HealthCheckPath: /api/v1/streaming/health
        PathPattern: /api/v1/streaming/*
        Priority: 2
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/24cf8ac2cb4ef96915ed55c63019e1eb.template

  Certificate:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        HostedZoneModule:
          Fn::GetAtt:
          - HostedZone
          - Outputs.StackName
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/a511f8593b7d394e9bc0060224f63264.template

  Record:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        HostedZoneModule:
          Fn::GetAtt:
          - HostedZone
          - Outputs.StackName
        LoadBalancerModule:
          Fn::GetAtt:
          - Alb
          - Outputs.StackName
        SubDomainNameWithDot: ''
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/7ad8ace5d3d9cb0b59b171b94410db2a.template

  S3Policy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Accessing S3 bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: s3:*
          Resource:
            Fn::Split:
            - ','
            - Fn::GetAtt:
              - Bucket
              - Outputs.IamResources

  WebService:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ClusterModule:
          Fn::GetAtt:
          - Cluster
          - Outputs.StackName
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        TargetModule:
          Fn::GetAtt:
          - Target
          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        ClientSgModule1:
          Fn::GetAtt:
          - ClientSg
          - Outputs.StackName
        ManagedPolicyArns:
          Ref: S3Policy
        AppImage:
          Fn::If:
          - HasOverrideMastodonContainerImage
          - Ref: OverrideMastodonContainerImage
          - public.ecr.aws/h6i3a8b9/mastodon:v4.5.3
        AppCommand: bash,-c,bundle exec rails db:migrate && bundle exec rails s -p 3000
        AppPort: '3000'
        AppEnvironment1Key: LOCAL_DOMAIN
        AppEnvironment1Value:
          Ref: DomainName
        AppEnvironment2Key: REDIS_HOST
        AppEnvironment2Value:
          Fn::GetAtt:
          - Cache
          - Outputs.DnsName
        AppEnvironment3Key: DB_PASS
        AppEnvironment3SecretModule:
          Fn::GetAtt:
          - Secret
          - Outputs.StackName
        AppEnvironment4Key: ES_ENABLED
        AppEnvironment4Value: 'false'
        AppEnvironment4SecretModule: ''
        AppEnvironment5Key: SECRET_KEY_BASE
        AppEnvironment5Value:
          Ref: SecretKeyBase
        AppEnvironment5SecretModule: ''
        AppEnvironment6Key: OTP_SECRET
        AppEnvironment6Value:
          Ref: OtpSecret
        AppEnvironment7Key: VAPID_PRIVATE_KEY
        AppEnvironment7Value:
          Ref: VapidPrivateKey
        AppEnvironment8Key: VAPID_PUBLIC_KEY
        AppEnvironment8Value:
          Ref: VapidPublicKey
        AppEnvironment9Key: S3_ENABLED
        AppEnvironment9Value: 'true'
        AppEnvironment10Key: S3_BUCKET
        AppEnvironment10Value:
          Fn::GetAtt:
          - Bucket
          - Outputs.Name
        AppEnvironment11Key: DB_NAME
        AppEnvironment11Value: mastodon
        AppEnvironment12Key: DB_USER
        AppEnvironment12Value: mastodon
        AppEnvironment13Key: DB_HOST
        AppEnvironment13Value:
          Fn::GetAtt:
          - Database
          - Outputs.DnsName
        AppEnvironment14Key: RAILS_ENV
        AppEnvironment14Value: production
        AppEnvironment15Key: SMTP_SERVER
        AppEnvironment15Value: localhost
        AppEnvironment16Key: SMTP_PORT
        AppEnvironment16Value: '25'
        AppEnvironment17Key: SMTP_FROM_ADDRESS
        AppEnvironment17Value:
          Fn::Sub: noreply@${DomainName}
        AppEnvironment18Key: S3_REGION
        AppEnvironment18Value:
          Ref: AWS::Region
        AppEnvironment19Key: S3_ALIAS_HOST
        AppEnvironment19Value:
          Fn::GetAtt:
          - CloudFront
          - Outputs.DistributionDomainName
        AppEnvironment20Key: S3_PERMISSION
        AppEnvironment20Value: private
        AppEnvironment21Key: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
        AppEnvironment21Value:
          Ref: ActiveRecordEncryptionDeterministicKey
        AppEnvironment22Key: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
        AppEnvironment22Value:
          Ref: ActiveRecordEncryptionKeyDerivationSalt
        AppEnvironment23Key: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
        AppEnvironment23Value:
          Ref: ActiveRecordEncryptionPrimaryKey
        Cpu: '0.5'
        Memory: '1'
        DesiredCount: '1'
        MaxCapacity: '4'
        MinCapacity: '1'
        LogsRetentionInDays: '14'
        SubnetsReach: Public
        AutoScaling: 'false'
        HealthCheckGracePeriodSeconds: '180'
        Spot:
          Ref: Spot
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
        ExecuteCommand: true
      TemplateURL: https://s3.eu-central-1.amazonaws.com/mastodon-on-aws-cloudformation/14e2f318d043a73fe7cc420fe39743ca.template

  StreamingApiService:
    DependsOn:
    - WebService
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ClusterModule:
          Fn::GetAtt:
          - Cluster
          - Outputs.StackName
        VpcModule:
          Fn::GetAtt:
          - Vpc
          - Outputs.StackName
        TargetModule:
          Fn::GetAtt:
