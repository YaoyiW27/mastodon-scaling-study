  ScheduledTask:
    DependsOn:
    - WebService
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ClusterModule:
          Fn::GetAtt:
          - Cluster
          - Outputs.StackName
        VpcModule:
          Fn::GetAtt:
