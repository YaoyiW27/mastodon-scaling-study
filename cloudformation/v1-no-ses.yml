          - Outputs.StackName
        AlertingModule:
          Fn::GetAtt:
          - Alerting
          - Outputs.StackName
        ClientSgModule1:
          Fn::GetAtt:
          - ClientSg
          - Outputs.StackName
        ManagedPolicyArns:
          Ref: S3Policy
        AppImage:
          Fn::If:
          - HasOverrideMastodonStreamingContainerImage
