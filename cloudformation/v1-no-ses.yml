          - public.ecr.aws/h6i3a8b9/mastodon-streaming:v4.5.3
        AppCommand: bash,-c,node ./streaming/index.js
        AppPort: '4000'
        AppEnvironment1Key: LOCAL_DOMAIN
        AppEnvironment1Value:
          Ref: DomainName
        AppEnvironment2Key: REDIS_HOST
